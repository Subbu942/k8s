apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-deployment
  labels:
    app: webapp
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: nanajanashia/k8s-webapp:v1.0 
        ports:
        - containerPort: 3000
        env:
        - name: USER_NAME 
          valueFrom:
            secretKeyRef:
              name: mongo-secret 
              key: mongo-user
        - name: USER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-secret 
              key: mongo-password
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: mongo-config
              key: mongo-url
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-service
spec:
  type: NodePort # defalut is ClusterIP, but we want to expose the service outside of the cluster, so we will use NodePort
  selector:
    app: webapp
  ports:
  - port: 3000  
    targetPort: 3000
    nodePort: 30001 # The port that the service will expose, and which port the traffic will be forwarded to on the pods, and which port to expose on the service, and which port to forward the traffic to on the pods, then nodeport range is 30000-32767
